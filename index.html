          })
        });

        let popupContent = `<strong>${loc.title}</strong><br><em>${loc.continent}</em>`;
        if (loc.image) {
          popupContent += `<br><img src="${loc.image}" width="120" style="margin-top:4px; cursor:pointer;" onclick="showModal('${loc.image}')" />`;
        }

        markers.addLayer(marker);

      function showModal(src) {
        document.getElementById("modalImg").src = src;
        document.getElementById("imageModal").style.display = "flex";
      }

      document.getElementById("imageModal").onclick = function() { this.style.display = "none"; };
