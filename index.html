        });

        let popupContent = `<strong>${loc.title}</strong>`;
        if (loc.image) {
          // Check if the image URL is a Street View link (using similar logic as in jelölő minta96)
          // In "jelölő minta96", the check was loc.image.includes("google.com/maps")
          // You might need to adjust this condition based on the exact format of your Street View URLs.
          // For demonstration, I'm using a simplified check.
          if (loc.image.includes("google.com/maps")) { // Modified condition
            popupContent += `
              <div class="streetview-container" onclick="window.open('${loc.image}', '_blank');event.stopPropagation();">
                  <div class="streetview-icon"></div>
                  <div class="streetview-text">Utcakép,<br>kattints ide!</div>
              </div>
            `;
          } else {
            popupContent += `<br><img src="${loc.image}" width="120" style="margin-top:4px; cursor:pointer;" onclick="showModal('${loc.image}');event.stopPropagation();" />`;
          }
        }
        marker.bindPopup(popupContent);
        markers.addLayer(marker);
      });

      map.addLayer(markers);

      function showModal(src) {
        const modal = document.getElementById("imageModal");
