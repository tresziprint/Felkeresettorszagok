    const map = L.map('map').setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const markerGroup = L.layerGroup().addTo(map);

    function renderView(data) {
        const container = document.getElementById('list-content');
        container.innerHTML = '';
        markerGroup.clearLayers();

        if (data.length === 0) {
            container.innerHTML = '<div class="empty-msg">Ezen a földrészen még nincsenek rögzített élményeid.</div>';
            return;
        }

        const grouped = data.reduce((acc, obj) => {
            if (!acc[obj.country]) acc[obj.country] = [];
            acc[obj.country].push(obj);
            return acc;
        }, {});

        for (const country in grouped) {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'country-group';
            const header = document.createElement('div');
            header.className = 'country-header';
            header.innerHTML = `<span>📍 ${country}</span><span>▼</span>`;
            const listWrapper = document.createElement('div');
            listWrapper.className = 'location-list';

            header.onclick = () => groupDiv.classList.toggle('active');

            grouped[country].forEach(item => {
                const popupHTML = `<div style="text-align:center"><b>${item.title}</b><br><img src="${item.image}" width="200" style="cursor:pointer;margin-top:5px" onclick="showBigImage('${item.image}')"></div>`;
                const card = document.createElement('div');
                card.className = 'location-card';
                card.innerHTML = `<img src="${item.image}" onerror="this.src='https://via.placeholder.com/40'"><span>${item.title}</span>`;
                
                card.onclick = (e) => {
                    e.stopPropagation();
                    map.flyTo([item.lat, item.lng], 15);
                    L.popup().setLatLng([item.lat, item.lng]).setContent(popupHTML).openOn(map);
                };
                
                listWrapper.appendChild(card);
                L.marker([item.lat, item.lng]).addTo(markerGroup).bindPopup(popupHTML);
            });

            groupDiv.appendChild(header);
            groupDiv.appendChild(listWrapper);
            container.appendChild(groupDiv);
        }
    }

    function filterByContinent(cont) {
        let filtered;
        if (cont === 'Összes') {
            filtered = rawData;
            map.flyTo([20, 0], 2);
        } else {
            filtered = rawData.filter(d => d.continent === cont);
            if (filtered.length > 0) {
                map.flyTo([filtered[0].lat, filtered[0].lng], 4);
            }
        }
        renderView(filtered);
    }

    function showBigImage(src) {
        document.getElementById("modalImg").src = src;
        document.getElementById("imageModal").style.display = "flex";
    }

    renderView(rawData);
</script>
