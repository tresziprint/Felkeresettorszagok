    const map = L.map('map').setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const markerGroup = L.layerGroup().addTo(map);

    function updateStats() {
        const totalPoints = rawData.length;
        const allCountries = [...new Set(rawData.map(item => item.country))].length;
        document.getElementById('btn-osszes').innerHTML = `🌍 Összes (${allCountries} ország, ${totalPoints} pont)`;

        const continents = {
            'btn-europa': 'Európa',
            'btn-azsia': 'Ázsia',
            'btn-afrika': 'Afrika',
            'btn-enamerica': 'Észak-Amerika'
        };

        for (let id in continents) {
            const contName = continents[id];
            const count = [...new Set(rawData.filter(item => item.continent === contName).map(item => item.country))].length;
            const btn = document.getElementById(id);
            if (btn) {
                const originalText = btn.innerHTML.split('(')[0].trim(); 
                btn.innerHTML = `${originalText} (${count})`;
            }
        }
    }

    // ÚJ: Popup tartalom kezelő utcakép-vizsgálattal
    function getPopupContent(item) {
        const isStreetView = item.image && item.image.includes("google.com/maps");
        let content = `<div style="text-align:center;"><strong>${item.title}</strong><br>`;
        
        if (isStreetView) {
            content += `
                <a href="${item.image}" target="_blank" style="text-decoration:none; color:#4285f4; font-weight:bold;">
                    <img src="${streetViewIcon}" style="width:100px; margin:10px 0; border-radius:5px;"><br>
                    Utcakép! Kattints ide!
                </a>`;
        } else if (item.image) {
            content += `<img src="${item.image}" width="180" onclick="showBigImage('${item.image}')" style="cursor:pointer;margin-top:8px;border-radius:3px;">`;
        }
        content += `</div>`;
        return content;
    }

    function renderView(data) {
        const container = document.getElementById('list-content');
        container.innerHTML = '';
        markerGroup.clearLayers();

        const grouped = data.reduce((acc, obj) => {
            if (!acc[obj.country]) acc[obj.country] = [];
            acc[obj.country].push(obj);
            return acc;
        }, {});

        for (const country in grouped) {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'country-group';

            const fCode = countryFlags[country] || "un"; 
            let flagHTML = (fCode === "custom_trans") ? `<img src="https://upload.wikimedia.org/wikipedia/commons/b/bc/Flag_of_Transnistria_%28state%29.svg" class="flag-img">` : 
                           (fCode === "custom_ncyp") ? `<img src="https://upload.wikimedia.org/wikipedia/commons/1/1e/Flag_of_the_Turkish_Republic_of_Northern_Cyprus.svg" class="flag-img">` : 
                           `<img src="https://flagcdn.com/w40/${fCode}.png" class="flag-img">`;

            const header = document.createElement('div');
            header.className = 'country-header';
            header.innerHTML = `<div class="header-left">${flagHTML} <span>${country} (${grouped[country].length})</span></div><span>▼</span>`;
            
            const listWrapper = document.createElement('div');
            listWrapper.className = 'location-list';

            header.onclick = () => {
                const isActive = groupDiv.classList.contains('active');
                document.querySelectorAll('.country-group').forEach(g => g.classList.remove('active'));
                if (!isActive) {
                    groupDiv.classList.add('active');
                    const points = grouped[country].map(p => [p.lat, p.lng]);
                    map.flyToBounds(L.latLngBounds(points), { padding: [50, 50], maxZoom: 12 });
                }
            };

            grouped[country].forEach(item => {
                const isStreetView = item.image && item.image.includes("google.com/maps");
                const thumbSrc = isStreetView ? streetViewIcon : item.image;

                const card = document.createElement('div');
                card.className = 'location-card';
                card.innerHTML = `
                    <img src="${thumbSrc}" style="width: 50px; height: 40px; object-fit: cover; border-radius: 3px; cursor: pointer;" 
                         onclick="event.stopPropagation(); ${isStreetView ? `window.open('${item.image}','_blank')` : `showBigImage('${item.image}')`}">
                    <span>${item.title}</span>
                `;

                card.onclick = (e) => {
                    e.stopPropagation();
                    const coords = [item.lat, item.lng];
                    map.flyTo(coords, 15, { duration: 0.5 });
                    
                    // Menü gomb kezelése
                    if (isStreetView) {
                        lastStreetViewUrl = item.image;
                        document.getElementById('mainStreetViewBtn').style.display = 'flex';
                    } else {
                        document.getElementById('mainStreetViewBtn').style.display = 'none';
                    }

                    L.popup({ autoPan: false }).setLatLng(coords).setContent(getPopupContent(item)).openOn(map);
                };

                listWrapper.appendChild(card);
                L.marker([item.lat, item.lng]).addTo(markerGroup).bindPopup(getPopupContent(item)).on('click', () => {
                    if (isStreetView) {
                        lastStreetViewUrl = item.image;
                        document.getElementById('mainStreetViewBtn').style.display = 'flex';
                    } else {
                        document.getElementById('mainStreetViewBtn').style.display = 'none';
                    }
                });
            });

            groupDiv.appendChild(header);
            groupDiv.appendChild(listWrapper);
            container.appendChild(groupDiv);
        }
    }

    function filterByContinent(cont) {
        const filtered = cont === 'Összes' ? rawData : rawData.filter(d => d.continent === cont);
        renderView(filtered);
        if (filtered.length > 0) {
            const bounds = L.latLngBounds(filtered.map(p => [p.lat, p.lng]));
            map.flyToBounds(bounds, { padding: [40, 40] });
        }
    }

    function showBigImage(src) {
        document.getElementById("modalImg").src = src;
        document.getElementById("imageModal").style.display = "flex";
    }

    updateStats();
    renderView(rawData);
</script>
